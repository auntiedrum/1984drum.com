        <main>
  <div class="tape-page">
    <div id="tape-deck" class="tape-deck" data-base="/assets/tape/">
      <div class="bb">
        <div class="bb__top">
          <div class="bb__handle"></div>
          <div class="bb__brand">1984&middot;DECK</div>
          <div class="bb__antenna"></div>
        </div>
        <div class="bb__row">
          <div class="bb__speaker"></div>
          <div class="bb__screen-wrap">
            <div class="bb__screen">
              <canvas width="640" height="400"></canvas>
              <div class="bb__idle">
                <div class="cassette"></div>
                <p>PRESS PLAY &mdash; A NEW 19-MIN MIX EVERY TIME</p>
              </div>
            </div>
            <div class="bb__readout">
              <span class="bb__status">INSERT TAPE</span>
              <span class="bb__time">00:00 / 19:00</span>
              <span class="bb__vu"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
            </div>
          </div>
          <div class="bb__speaker"></div>
        </div>
        <div class="bb__deck">
          <div class="bb__transport">
            <button class="bb__btn bb__btn--play" type="button" aria-label="Play / Pause"></button>
            <button class="bb__btn bb__btn--new" type="button" aria-label="New mix" title="New mix">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M4 12a8 8 0 0 1 14-5l2 2M20 12a8 8 0 0 1-14 5l-2-2"/><path d="M18 3v4h-4M6 21v-4h4"/></svg>
            </button>
          </div>
          <div class="bb__sliders">
            <div class="bb__ctl">
              <label for="tapeVol">Volume</label>
              <input id="tapeVol" class="bb__range" data-ctl="volume" type="range" min="0" max="1" step="0.01" value="0.85">
              <output data-out="volume">85%</output>
            </div>
            <div class="bb__ctl">
              <label for="tapeSpd">Speed</label>
              <input id="tapeSpd" class="bb__range" data-ctl="speed" type="range" min="0.5" max="1" step="0.01" value="1">
              <output data-out="speed">1.00&times;</output>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="tape-shelf" style="display:none">
      <h4>Saved Tapes</h4>
      <div class="tape-shelf__list"></div>
    </div>
  </div>

  <div class="tape-save">
    <div class="tape-save__box">
      <h3>SIDE A &mdash; COMPLETE</h3>
      <p>You heard the whole tape. Name it to keep it forever &mdash; or lose it.</p>
      <div class="tape-save__timer">30s</div>
      <input type="text" maxlength="28" placeholder="name this mix&hellip;" aria-label="Name this mix">
      <div class="tape-save__btns">
        <button type="button" class="tape-save__keep">SAVE TAPE</button>
        <button type="button" class="tape-save__let">LET IT GO</button>
      </div>
    </div>
  </div>
  <div class="tape-boom"><span>&#128165;</span></div>
        </main>
