  <div class="tape-page">
    <div id="tape-deck" class="tape-stage" data-base="/assets/tape/">
      <canvas class="tape-stage__canvas" width="1280" height="720"></canvas>
      <div class="tape-stage__idle">
        <div class="tape-stage__play"><svg viewBox="0 0 24 24"><path d="M7 5l12 7-12 7z"/></svg></div>
        <p>PRESS PLAY</p>
        <p class="sub">a new 19-minute mix &amp; visual every time</p>
      </div>
      <div class="tape-bar">
        <button class="tape-bar__btn bb__btn--play" type="button" aria-label="Play / Pause"></button>
        <button class="tape-bar__btn bb__btn--new" type="button" aria-label="New mix" title="New mix">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12a8 8 0 0 1 14-5l2 2M20 12a8 8 0 0 1-14 5l-2-2"/><path d="M18 3v4h-4M6 21v-4h4"/></svg>
        </button>
        <span class="tape-bar__time"><span class="bb__time">00:00 / 19:00</span></span>
        <div class="tape-bar__seek" role="slider" tabindex="0" aria-label="Seek through the mix" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="tape-bar__seek-track"><div class="tape-bar__seek-fill"></div><div class="tape-bar__seek-knob"></div></div>
        </div>
        <span class="bb__status tape-bar__status">INSERT TAPE</span>
        <button class="tape-bar__btn tape-dl" type="button" aria-label="Download this mix" title="Download this mix (MP3)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10m0 0l-4-4m4 4l4-4M5 19h14" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="tape-bar__btn tape-fs" type="button" aria-label="Fullscreen" title="Fullscreen">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 9V4h5v2H6v3H4zm0 6h2v3h3v2H4v-5zm16 0v5h-5v-2h3v-3h2zM20 9h-2V6h-3V4h5v5z"/></svg>
        </button>
      </div>
    </div>

    <div class="tape-shelf" style="display:none">
      <h4>Saved Tapes</h4>
      <div class="tape-shelf__list"></div>
    </div>
  </div>

  <div class="tape-save">
    <div class="tape-save__box">
      <h3>SIDE A &mdash; COMPLETE</h3>
      <p>You heard the whole tape. Name it to keep it forever &mdash; or lose it.</p>
      <div class="tape-save__timer">30s</div>
      <input type="text" maxlength="28" placeholder="name this mix&hellip;" aria-label="Name this mix">
      <div class="tape-save__btns">
        <button type="button" class="tape-save__keep">SAVE TAPE</button>
        <button type="button" class="tape-save__let">LET IT GO</button>
      </div>
    </div>
  </div>
  <div class="tape-boom"><span>&#128165;</span></div>
